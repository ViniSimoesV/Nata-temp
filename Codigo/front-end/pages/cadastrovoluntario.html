<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Voluntários - NATA</title>
    <link rel="stylesheet" href="../css/layout.css"> 
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <link rel="stylesheet" href="../css/tabela.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="../js/sidebar.js" defer></script>
    <script src="../js/topbar.js" defer></script>
    <script src="../js/components.js" defer></script>
    <script src="../js/voluntario.js" defer></script>
</head>
<body data-nav-active="voluntarios">
    <div class="layout-app">

        <div id="sidebar-container"></div>

        <div class="conteudo-direito">
            
            <header class="topbar">
                <div class="topbar-titulo">
                    <h1>Voluntários</h1>
                </div>
                
                <div class="topbar-usuario">
                    <div class="separador"></div>
                    <span class="saudacao">
                        Olá, <strong id="nome-usuario">carregando...</strong>
                    </span>
                </div>
            </header>

            <main class="area-principal area-cadastro">
                
                <div class="cabecalho-cadastro">
                    <button class="btn-voltar" onclick="window.history.back()">
                        <i class="ph ph-caret-left"></i> Voltar
                    </button>
                    <h2 class="titulo-serifado">CADASTRAR NOVO VOLUNTÁRIO</h2>
                    <div></div> </div>

                <hr class="linha-divisoria">

                <form class="form-cadastro" onsubmit="cadastrarVoluntario(event)">
                    
                    <section class="secao-form">
                        <div class="secao-header">
                            <h3>Informações Pessoais</h3>
                            <div class="radio-status">
                                <label><input type="radio" name="status" value="ativo" checked> Ativo</label>
                                <label><input type="radio" name="status" value="pendente"> Pendente</label>
                                <label><input type="radio" name="status" value="inativo"> Inativo</label>
                            </div>
                        </div>

                        <div class="grid-2-colunas">
                            <div class="input-grupo-form">
                                <label>Nome Completo</label>
                                <input type="text" name="nome" placeholder="Digite o nome completo">
                            </div>
                            <div class="input-grupo-form">
                                <label>Email</label>
                                <input type="email" name="email" placeholder="Digite o e-mail">
                            </div>
                            <div class="input-grupo-form">
                                <label>Telefone</label>
                                <input type="text" name="telefone" placeholder="(  ) _____-____">
                            </div>
                            <div class="input-grupo-form">
                                <label>Data de Nascimento</label>
                                <input type="date" name="data_nascimento">
                            </div>
                        </div>
                    </section>

                    <section class="secao-form">
    <h3>Habilidades</h3>
    <div class="grid-3-colunas">
        <label><input type="checkbox" name="habilidades" value="Educação/Ensino"> Educação/Ensino</label>
        <label><input type="checkbox" name="habilidades" value="Esporte/Lazer"> Esporte/Lazer</label>
        <label><input type="checkbox" name="habilidades" value="Evento/Organização"> Evento/Organização</label>
        <label><input type="checkbox" name="habilidades" value="Saúde/Bem Estar"> Saúde/Bem Estar</label>
        <label><input type="checkbox" name="habilidades" value="Administrativo"> Administrativo</label>
        <label><input type="checkbox" name="habilidades" value="Logística"> Logística</label>
    </div>
    <div class="input-grupo-form mt-15">
        <label>Outras habilidades (se houver)</label>
        <textarea id="outras_habilidades" rows="3"></textarea> 
    </div>
</section>

<section class="secao-form">
    <h3>Disponibilidade (Dias e Horários)</h3>
    <table class="tabela-disponibilidade">
        <thead>
            <tr>
                <th></th>
                <th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th><th>Dom</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Manhã</strong><br><small>8-12h</small></td>
                <td><input type="checkbox" name="disponibilidade" value="Seg-Manha"></td>
                <td><input type="checkbox" name="disponibilidade" value="Ter-Manha"></td>
                <td><input type="checkbox" name="disponibilidade" value="Qua-Manha"></td>
                <td><input type="checkbox" name="disponibilidade" value="Qui-Manha"></td>
                <td><input type="checkbox" name="disponibilidade" value="Sex-Manha"></td>
                <td><input type="checkbox" name="disponibilidade" value="Sab-Manha"></td>
                <td><input type="checkbox" name="disponibilidade" value="Dom-Manha"></td>
            </tr>
            <tr>
                <td><strong>Tarde</strong><br><small>13-17h</small></td>
                <td><input type="checkbox" name="disponibilidade" value="Seg-Tarde"></td>
                <td><input type="checkbox" name="disponibilidade" value="Ter-Tarde"></td>
                <td><input type="checkbox" name="disponibilidade" value="Qua-Tarde"></td>
                <td><input type="checkbox" name="disponibilidade" value="Qui-Tarde"></td>
                <td><input type="checkbox" name="disponibilidade" value="Sex-Tarde"></td>
                <td><input type="checkbox" name="disponibilidade" value="Sab-Tarde"></td>
                <td><input type="checkbox" name="disponibilidade" value="Dom-Tarde"></td>
            </tr>
            <tr>
                <td><strong>Noite</strong><br><small>18-22h</small></td>
                <td><input type="checkbox" name="disponibilidade" value="Seg-Noite"></td>
                <td><input type="checkbox" name="disponibilidade" value="Ter-Noite"></td>
                <td><input type="checkbox" name="disponibilidade" value="Qua-Noite"></td>
                <td><input type="checkbox" name="disponibilidade" value="Qui-Noite"></td>
                <td><input type="checkbox" name="disponibilidade" value="Sex-Noite"></td>
                <td><input type="checkbox" name="disponibilidade" value="Sab-Noite"></td>
                <td><input type="checkbox" name="disponibilidade" value="Dom-Noite"></td>
            </tr>
        </tbody>
    </table>

    <div class="input-grupo-form mt-15">
        <label>Observações sobre a disponibilidade (se houver)</label>
        <textarea id="obs_disponibilidade" rows="3"></textarea>
    </div>
</section>
                    </section>

                    <div class="acoes-rodape">
                        <button type="button" class="btn-cancelar" onclick="window.history.back()">CANCELAR</button>
                        <button type="submit" class="btn-salvar">CADASTRAR VOLUNTÁRIO</button>
                    </div>

                </form>
            </main>

            <div id="footer-container"></div>

        </div> </div> </body>
</html>
