<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Rota - NATA</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="stylesheet" href="../css/tabelaManutencao.css"> 
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/sidebar.js" defer></script>
    <script src="../js/topbar.js" defer></script>
    <script src="../js/editarrota.js" defer></script>
</head>
<body data-nav-active="rotas">
    <div class="layout-app">
        <div id="sidebar-container"></div>
        <div class="conteudo-direito">
            <header class="topbar">
                <div class="topbar-titulo"><h1>Logística</h1></div>
                <div class="topbar-usuario">
                    <span class="saudacao">Olá, <strong id="nome-usuario">Admin</strong></span>
                </div>
            </header>

            <main class="area-principal area-cadastro">
                <div class="cabecalho-cadastro">
                    <button class="btn-voltar" onclick="window.location.href='rotas.html'">
                        <i class="ph ph-caret-left"></i> Voltar
                    </button>
                    <h2 class="titulo-serifado">Editar Plano de Rota</h2>
                </div>

                <form id="form-editar-rota" class="form-cadastro">
                    <section class="secao-form">
                        <h3 class="titulo-serifado">Informações Gerais</h3>
                        <div class="grid-2-colunas">
                            <div class="input-grupo-form">
                                <label>Nome da Rota</label>
                                <input type="text" id="edit-nome-rota" name="nome_rota" required>
                            </div>
                            <div class="input-grupo-form">
                                <label>Tipo da Rota</label>
                                <select id="edit-tipo-rota" name="tipo_rota">
                                    <option value="Misto">Misto</option>
                                    <option value="Coleta">Coleta</option>
                                    <option value="Entrega">Entrega</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid-2-colunas mt-20">
                            <div class="input-grupo-form">
                                <label>Veículo Padrão</label>
                                <select id="select-veiculo" name="id_veiculo"></select>
                            </div>
                            <div class="input-grupo-form">
                                <label>Motorista Padrão</label>
                                <select id="select-motorista" name="id_motorista"></select>
                            </div>
                        </div>
                    </section>

                    <section class="secao-form">
                        <h3 class="titulo-serifado">Itinerário (Pontos de Parada)</h3>
                        <div class="grid-2-colunas" style="align-items: flex-end;">
                            <div class="input-grupo-form">
                                <label>Adicionar Novo Ponto</label>
                                <select id="select-ponto-base">
                                    <option value="">Selecione um local...</option>
                                </select>
                            </div>
                            <button type="button" class="btn-primario" onclick="adicionarPontoNaLista()" style="height: 45px;">
                                <i class="ph ph-plus"></i> Inserir na Rota
                            </button>
                        </div>

                        <div class="container-tabela mt-20">
                            <table class="tabela-manutencao">
                                <thead>
                                    <tr>
                                        <th>Ordem</th>
                                        <th>Ponto</th>
                                        <th>Tipo</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="lista-paradas-corpo"></tbody>
                            </table>
                        </div>
                    </section>

                    <section class="secao-form">
                        <h3 class="titulo-serifado">Visualização do Itinerário</h3>
                        <div id="mapa-placeholder" style="width: 100%; height: 300px; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 2px dashed #ccc;">
                            <p><i class="ph ph-map-trifold" style="font-size: 2rem;"></i> <br> Mapa de rota ativa</p>
                        </div>
                    </section>

                    <div class="acoes-rodape">
                        <button type="button" class="btn-cancelar" onclick="confirmarRemoverRota()" style="background-color: #d93025; color: white;">
                            <i class="ph ph-trash"></i> REMOVER ROTA
                        </button>
                        <div style="display: flex; gap: 10px;">
                            <button type="button" class="btn-cancelar" onclick="window.location.href='rotas.html'">CANCELAR</button>
                            <button type="submit" class="btn-salvar">SALVAR ALTERAÇÕES</button>
                        </div>
                    </div>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
