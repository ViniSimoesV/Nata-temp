<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Parceiro - NATA</title>
    <link rel="stylesheet" href="../css/layout.css"> 
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../js/cadastroparceiro.js" defer></script>
    <script src="../js/sidebar.js" defer></script>
    <script src="../js/topbar.js" defer></script>
    <script src="../js/parceiros.js" defer></script>
</head>
<body data-nav-active="parceiros">
    <div class="layout-app">
        <div id="sidebar-container"></div>

        <div class="conteudo-direito">
            <header class="topbar">
                <div class="topbar-titulo"><h1>Parceiros</h1></div>
                <div class="topbar-usuario">
                    <div class="separador"></div>
                    <span class="saudacao">Olá, <strong id="nome-usuario">Admin</strong></span>
                </div>
            </header>

            <main class="area-principal area-cadastro">
                <div class="cabecalho-cadastro">
                    <button class="btn-voltar" onclick="window.location.href='parceiros.html'">
                        <i class="ph ph-caret-left"></i> Voltar
                    </button>
                    <h2 class="titulo-serifado">Cadastrar novo Parceiro</h2>
                    <div></div>
                </div>

                <hr class="linha-divisoria">

                <form id="form-novo-parceiro" class="form-cadastro">
                    
                    <section class="secao-form">
                        <h3>Informações da Empresa</h3>
                        <div class="grid-2-colunas">
                            <div class="input-grupo-form">
                                <label>Nome da Empresa</label>
                                <input type="text" name="nome_empresa" placeholder="Nome da Instituição">
                            </div>
                            <div class="input-grupo-form">
                                <label>CNPJ</label>
                                <input type="text" name="cnpj" placeholder="00.000.000/0000-00">
                            </div>
                        </div>
                    </section>

                    <section class="secao-form">
                        <h3>Endereço da Empresa</h3>
                        <div class="grid-3-colunas">
                            <div class="input-grupo-form">
                                <label>CEP</label>
                                <input type="text" name="cep">
                            </div>
                            <div class="input-grupo-form">
                                <label>Rua</label>
                                <input type="text" name="rua">
                            </div>
                            <div class="input-grupo-form">
                                <label>Número</label>
                                <input type="text" name="numero">
                            </div>
                            <div class="input-grupo-form">
                                <label>Bairro</label>
                                <input type="text" name="bairro">
                            </div>
                            <div class="input-grupo-form">
                                <label>Cidade</label>
                                <input type="text" name="cidade">
                            </div>
                            <div class="input-grupo-form">
                                <label>Complemento</label>
                                <input type="text" name="complemento">
                            </div>
                        </div>
                    </section>

                    <section class="secao-form">
                        <div class="grid-2-colunas">
                            <div class="input-grupo-form">
                                <label>É Ponto de coleta?</label>
                                <div class="radio-status">
                                    <label><input type="radio" name="ponto_coleta" value="sim"> Sim</label>
                                    <label><input type="radio" name="ponto_coleta" value="nao" checked> Não</label>
                                </div>
                            </div>
                            <div class="input-grupo-form">
                                <label>É Ponto de entrega?</label>
                                <div class="radio-status">
                                    <label><input type="radio" name="ponto_entrega" value="sim"> Sim</label>
                                    <label><input type="radio" name="ponto_entrega" value="nao" checked> Não</label>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="secao-form">
                        <h3>Informações do Representante</h3>
                        <div class="grid-2-colunas">
                            <div class="input-grupo-form" style="grid-column: span 2;">
                                <label>Nome Completo</label>
                                <input type="text" name="nome_rep" placeholder="Nome do representante legal">
                            </div>
                            <div class="input-grupo-form">
                                <label>Telefone</label>
                                <input type="text" name="tel_rep">
                            </div>
                            <div class="input-grupo-form">
                                <label>E-mail</label>
                                <input type="email" name="email_rep">
                            </div>
                        </div>
                    </section>

                    <div class="acoes-rodape">
                        <button type="button" class="btn-cancelar" onclick="window.history.back()">CANCELAR</button>
                        <button type="submit" class="btn-salvar"> <i class="ph ph-plus"></i> Criar Novo parceiro </button>
                    </div>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
