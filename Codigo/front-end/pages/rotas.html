<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Rotas - NATA</title>
        <link rel="stylesheet" href="../css/layout.css"> 
        <link rel="stylesheet" href="../css/sidebar.css">
        <link rel="stylesheet" href="../css/topbar.css">
        <link rel="stylesheet" href="../css/cardRota.css">
        <link rel="stylesheet" href="../css/modalB.css">        
        <link rel="stylesheet" href="../css/filtros.css">
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&display=swap" rel="stylesheet">
        <script src="https://unpkg.com/@phosphor-icons/web"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        
        <script src="../js/sidebar.js" defer></script>
        <script src="../js/topbar.js" defer></script>
        <script src="../js/rotas.js" defer></script>
    </head>
    <body data-nav-active="rotas">
        <div class="layout-app">

            <div id="sidebar-container"></div>

            <div class="conteudo-direito">
                
                <header class="topbar">
                    <div class="topbar-titulo">
                        <h1> Rotas </h1>
                    </div>
                    
                    <div class="topbar-usuario">
                        <div class="separador"></div>
                        <span class="saudacao">
                            Olá, <strong id="nome-usuario">carregando...</strong>
                        </span>
                    </div>
                </header>

                <main class="area-principal">
                    <div class="acoes-topo">
                        <button class="btn-primario" onclick="window.location.href='cadastrorota.html'">
                            <i class="ph ph-plus"></i> Adicionar rota
                        </button>
                    </div>

                    <h2 class="titulo-secao">Lista de rotas</h2>

                    <div class="barra-filtros-rotas">
                        <div class="input-grupo pesquisa">
                            <i class="ph ph-magnifying-glass"></i> 
                            <input type="text" id="pesquisa-geral" placeholder="Nome da rota ou ponto de parada...">
                        </div>

                        <div class="filtros-container-flex">
                            <div class="grupo-filtro">
                                <span class="label-filtro">Tipo:</span>
                                <select id="filtro-tipo" class="select-filtro">
                                    <option value="">Todos</option>
                                    <option value="Coleta">Coleta</option>
                                    <option value="Entrega">Entrega</option>
                                    <option value="Misto">Misto</option>
                                </select>
                            </div>

                            <div class="grupo-filtro">
                                <span class="label-filtro">Veículo:</span>
                                <select id="filtro-veiculo" class="select-filtro">
                                    <option value="">Todos</option>
                                </select>
                            </div>

                            <div class="grupo-filtro">
                                <span class="label-filtro">Motorista:</span>
                                <select id="filtro-motorista" class="select-filtro">
                                    <option value="">Todos</option>
                                </select>
                            </div>

                            <div class="grupo-filtro">
                                <span class="label-filtro">Status:</span>
                                <select id="filtro-status" class="select-filtro">
                                    <option value="">Todos</option>
                                    <option value="1">Registrada</option>
                                    <option value="2">Em Rota</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="container-cards" id="container-rotas">
                    </div>

                    <div class="paginacao-container">
                        <span class="info-paginacao" id="info-paginacao">Carregando informações...</span>
                        <div class="controles-paginacao" id="controles-paginacao"></div>
                    </div>

                    <div class="modal-overlay" id="modal-overlay" onclick="fecharModais()"></div>

                    <div class="modal-caixa modal-larga" id="modal-editar-parceiro">
                        <button class="btn-fechar-flutuante" onclick="fecharModais()">&times;</button>

                        <div class="modal-corpo">
                            <h2 class="titulo-modal-serif">Editar Dados da Rota</h2>

                            <form id="form-editar-parceiro">
                                <input type="hidden" id="editar-id">

                                <div class="input-grupo-form">
                                    <label for="editar-nome">Nome da Empresa/Instituição</label>
                                    <input type="text" id="editar-nome" required>
                                </div>

                                <div class="grid-2-colunas mt-20">
                                    <div class="input-grupo-form">
                                        <label>Ponto de coleta</label>
                                        <div class="radio-status">
                                            <label><input type="radio" name="editar-ponto-coleta" id="coleta-sim" value="true"> Sim</label>
                                            <label><input type="radio" name="editar-ponto-coleta" id="coleta-nao" value="false"> Não</label>
                                        </div>
                                    </div>
                                    <div class="input-grupo-form">
                                        <label>Ponto de entrega</label>
                                        <div class="radio-status">
                                            <label><input type="radio" name="editar-ponto-entrega" id="entrega-sim" value="true"> Sim</label>
                                            <label><input type="radio" name="editar-ponto-entrega" id="entrega-nao" value="false"> Não</label>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="input-grupo-form mt-20">
                                    <label for="editar-cep">CEP</label>
                                    <input type="text" id="editar-cep">
                                </div>

                                <div class="grid-3-colunas mt-20">
                                    <div class="input-grupo-form">
                                        <label for="editar-rua">Rua/Avenida</label>
                                        <input type="text" id="editar-rua">
                                    </div>
                                    <div class="input-grupo-form">
                                        <label for="editar-numero">Número</label>
                                        <input type="text" id="editar-numero">
                                    </div>
                                    <div class="input-grupo-form">
                                        <label for="editar-bairro">Bairro</label>
                                        <input type="text" id="editar-bairro">
                                    </div>
                                </div>

                                <div class="input-grupo-form mt-20">
                                    <label for="editar-cidade">Cidade</label>
                                    <input type="text" id="editar-cidade">
                                </div>

                                <div class="input-grupo-form mt-20">
                                    <label for="editar-contato">Nome do Representante</label>
                                        <input type="text" id="editar-contato">
                                </div>

                                <div class="grid-2-colunas mt-20">
                                    <div class="input-grupo-form">
                                        <label for="editar-email">E-mail</label>
                                        <input type="email" id="editar-email">
                                    </div>
                                    <div class="input-grupo-form">
                                        <label for="editar-telefone">Telefone</label>
                                        <input type="text" id="editar-telefone">
                                    </div>
                                </div>

                                <div class="input-grupo-form mt-20">
                                    <label for="editar-cnpj">CNPJ</label>
                                    <input type="text" id="editar-cnpj">
                                </div>

                                <div class="acoes-modal-centralizadas">
                                    <button type="button" class="btn-modal-deletar-real" onclick="abrirConfirmacaoExclusao()">
                                        <i class="ph ph-trash"></i> EXCLUIR
                                    </button>
                                    <button type="button" class="btn-modal-deletar" onclick="fecharModais()">Cancelar</button>
                                    <button type="submit" class="btn-modal-salvar">
                                        <i class="ph ph-floppy-disk"></i> Atualizar Dados
                                    </button>
                                </div>

                                <div class="modal-caixa modal-confirmacao" id="modal-confirmar-exclusao">
                                    <div class="modal-corpo-confirmacao">
                                        <header class="header-confirmacao">
                                            <h3>REMOVER [<span id="nome-exclusao-titulo"></span>] ?</h3>
                                        </header>
                                        <div class="conteudo-confirmacao">
                                            <p>TEM CERTEZA QUE DESEJA EXCLUIR O PARCEIRO [<span id="nome-exclusao-corpo"></span>]?</p>
                                        </div>
                                        <div class="acoes-confirmacao">
                                            <button type="button" class="btn-cancela-confirmacao" onclick="fecharConfirmacao()">CANCELAR</button>
                                            <button type="button" class="btn-sim-confirmacao" id="btn-confirmar-delete">SIM</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <script src="https://unpkg.com/@phosphor-icons/web"></script>
                </main>

                <div id="footer-container"></div>

            </div>
        </div> 
    </body>
</html>
