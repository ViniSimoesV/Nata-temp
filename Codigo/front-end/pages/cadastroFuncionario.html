<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Participantes - NATA</title>
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <link rel="stylesheet" href="../css/tabela.css">
    <link rel="stylesheet" href="../css/cadastro.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script src="../js/sidebar.js" defer></script>
    <script src="../js/topbar.js" defer></script>
    <script src="../js/components.js" defer></script>
    <script src="../js/cadastroFuncionario.js" defer></script>
</head>

<body data-nav-active="participantes">
    <div class="layout-app">

        <div id="sidebar-container"></div>

        <div class="conteudo-direito">

            <header class="topbar">
                <div class="topbar-titulo">
                    <h1>Participantes</h1>
                </div>

                <div class="topbar-usuario">
                    <div class="separador"></div>
                    <span class="saudacao">
                        Olá, <strong id="nome-usuario">carregando...</strong>
                    </span>
                </div>
            </header>

            <main class="area-principal area-cadastro">

                <div class="cabecalho-cadastro">
                    <button class="btn-voltar" onclick="window.history.back()">
                        <i class="ph ph-caret-left"></i> Voltar
                    </button>
                    <h2 class="titulo-serifado">CADASTRAR NOVO FUNCIONÁRIO</h2>
                    <div></div>
                </div>

                <hr class="linha-divisoria">

                <form class="form-cadastro" onsubmit="cadastrarParticipante(event)">

                    <section class="secao-form">
                        <div class="secao-header">
                            <h3>Informações do funcionário</h3>
                        </div>
                        
                        <!-- coletar dados: nome, cpf, telefone, email, cargo (opções predefinidas), senha gera aleatoriamente e envia no email no back *\ --> 

                        <div class="grid-2-colunas">
                            <div class="input-grupo-form">
                                <label>Nome Completo</label>
                                <input type="text" id="nome-funcionario" required placeholder="Digite o seu Nome">
                            </div>
                            <div class="input-grupo-form">
                                <label for="cpf-funcionario">CPF</label>
                                <input 
                                    type="text" 
                                    id="cpf-funcionario" 
                                    required 
                                    placeholder="000.000.000-00" 
                                    maxlength="14"
                                    autocomplete="off"
                                >
                            </div>
                        </div>

                        <div class="grid-3-colunas" style="margin-top: 15px;">
                            <div class="input-grupo-form">
                                <label for="telefone-funcionario">Telefone</label>
                                <input 
                                    type="text" 
                                    id="telefone-funcionario" 
                                    required 
                                    placeholder="(00) 00000-0000" 
                                    maxlength="15"
                                    autocomplete="off"
                                >
                            </div>
                            <div class="input-grupo-form">
                                <label>Email de contato</label>
                                <input type="text" id="email-funcionario" required placeholder="Insira o seu email ">
                            </div>
                            <div class="input-grupo-form">
                                <label>Cargo </label>
                                <select id="cargo-funcionario" name="cargo" required>
                                    <option value="" disabled selected>Selecione uma opção...</option>
                                    <option value="Professor">Professor</option>
                                    <option value="Coordenador">Coordenador</option>
                                    <option value="Administrativo">Administrativo</option>
                                    <option value="Financeiro">Financeiro</option>
                                    <option value="Voluntário">Voluntário</option>
                                </select>
                            </div>
                        </div>
                    </section>
                    <div class="acoes-rodape">
                        <button type="submit" class="btn-salvar">CADASTRAR FUNCIONÁRIO</button>
                        <button type="button" class="btn-cancelar" onclick="window.history.back()">CANCELAR</button>
                    </div>
                </form>
            </main>

            <div id="footer-container"></div>

        </div>
    </div>
</body>

</html>
