<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Motorista - NATA</title>
    <link rel="stylesheet" href="../css/layout.css"> 
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../js/cadastromotorista.js" defer></script>
    <script src="../js/sidebar.js" defer></script>
    <script src="../js/topbar.js" defer></script>
    <script src="../js/motoristas.js" defer></script>
</head>
<body data-nav-active="motoristas">
    <div class="layout-app">
        <div id="sidebar-container"></div>

        <div class="conteudo-direito">
            <header class="topbar">
                <div class="topbar-titulo"><h1>Motoristas</h1></div>
                <div class="topbar-usuario">
                    <div class="separador"></div>
                    <span class="saudacao">Olá, <strong id="nome-usuario">Admin</strong></span>
                </div>
            </header>

            <main class="area-principal area-cadastro">
                <div class="cabecalho-cadastro">
                    <button class="btn-voltar" onclick="window.location.href='motoristas.html'">
                        <i class="ph ph-caret-left"></i> Voltar
                    </button>
                    <h2 class="titulo-serifado">Cadastrar novo Motorista</h2>
                    <div></div>
                </div>

                <hr class="linha-divisoria">

                <form id="form-novo-motorista" class="form-cadastro">
                    
                    <section class="secao-form">
                        <h3>Informações do motorista</h3>

                        <div class="grid-2-colunas">
                            <div class="input-grupo-form">
                                <label>Nome do Motorista</label>
                                <input type="text" name="nome_motorista" placeholder="Nome completo">
                            </div>
                            <div class="input-grupo-form">
                                <label>CPF</label>
                                <input type="text" name="cpf_motorista" placeholder="000.000.000-00">
                            </div>
                        </div>
                        
                        <br>
                        <div class="grid-2-colunas">
                            <div class="input-grupo-form">
                                <label>Telefone</label>
                                <input type="text" name="tel_rep" placeholder="(00) 00000-0000">
                            </div>
                            <div class="input-grupo-form">
                                <label>E-mail</label>
                                <input type="text" name="email_rep" placeholder="email@exemplo.com">
                            </div>
                        </div>
                    </section>

                    <section class="secao-form">
                        <h3>Endereço do Motorista</h3>
                        <div class="grid-3-colunas">
                            <div class="input-grupo-form">
                                <label>CEP</label>
                                <input type="text" name="cep" placeholder="00000-000">
                            </div>
                            <div class="input-grupo-form">
                                <label>Rua</label>
                                <input type="text" name="rua">
                            </div>
                            <div class="input-grupo-form">
                                <label>Número</label>
                                <input type="text" name="numero">
                            </div>
                            <div class="input-grupo-form">
                                <label>Bairro</label>
                                <input type="text" name="bairro">
                            </div>
                            <div class="input-grupo-form">
                                <label>Cidade</label>
                                <input type="text" name="cidade">
                            </div>
                            <div class="input-grupo-form">
                                <label>Complemento</label>
                                <input type="text" name="complemento" placeholder="Apto, Casa, etc.">
                            </div>
                        </div>
                    </section>

                    <section class="secao-form">
                            <div class="input-grupo-form">
                                <label>Tipo de CNH</label>
                                <div class="radio-status">
                                    <label><input type="checkbox" name="cnh_a" value="sim"> A</label>
                                    <label><input type="checkbox" name="cnh_b" value="sim"> B</label>
                                    <label><input type="checkbox" name="cnh_c" value="sim"> C</label>
                                </div>
                            </div>
                    </section>

                    <section class="secao-form">
                    <h3>Disponibilidade</h3>
                    <table class="tabela-disponibilidade">
                        <thead>
                            <tr>
                                <th></th>
                                <th>Seg</th>
                                <th>Ter</th>
                                <th>Qua</th>
                                <th>Qui</th>
                                <th>Sex</th>
                                <th>Sáb</th>
                                <th>Dom</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Manhã (8-12h)</td>
                                <td><input type="checkbox" name="disp" value="seg-manha"></td>
                                <td><input type="checkbox" name="disp" value="ter-manha"></td>
                                <td><input type="checkbox" name="disp" value="qua-manha"></td>
                                <td><input type="checkbox" name="disp" value="qui-manha"></td>
                                <td><input type="checkbox" name="disp" value="sex-manha"></td>
                                <td><input type="checkbox" name="disp" value="sab-manha"></td>
                                <td><input type="checkbox" name="disp" value="dom-manha"></td>
                            </tr>
                            <tr>
                                <td>Tarde (13-17h)</td>
                                <td><input type="checkbox" name="disp" value="seg-tarde"></td>
                                <td><input type="checkbox" name="disp" value="ter-tarde"></td>
                                <td><input type="checkbox" name="disp" value="qua-tarde"></td>
                                <td><input type="checkbox" name="disp" value="qui-tarde"></td>
                                <td><input type="checkbox" name="disp" value="sex-tarde"></td>
                                <td><input type="checkbox" name="disp" value="sab-tarde"></td>
                                <td><input type="checkbox" name="disp" value="dom-tarde"></td>
                            </tr>
                            <tr>
                                <td>Noite (18-22h)</td>
                                <td><input type="checkbox" name="disp" value="seg-noite"></td>
                                <td><input type="checkbox" name="disp" value="ter-noite"></td>
                                <td><input type="checkbox" name="disp" value="qua-noite"></td>
                                <td><input type="checkbox" name="disp" value="qui-noite"></td>
                                <td><input type="checkbox" name="disp" value="sex-noite"></td>
                                <td><input type="checkbox" name="disp" value="sab-noite"></td>
                                <td><input type="checkbox" name="disp" value="dom-noite"></td>
                            </tr>
                        </tbody>
                    </table>
                </section>

                    <div class="acoes-rodape">
                        <button type="button" class="btn-cancelar" onclick="window.history.back()">CANCELAR</button>
                        <button type="submit" class="btn-salvar"> <i class="ph ph-plus"></i> Criar Novo parceiro </button>
                    </div>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
