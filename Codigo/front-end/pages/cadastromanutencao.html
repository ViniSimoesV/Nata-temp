<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Registrar Manutenção - NATA</title>
    <link rel="stylesheet" href="../css/layout.css"> 
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/topbar.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../js/cadastromanutencao.js" defer></script>
    <script src="../js/sidebar.js" defer></script>
    <script src="../js/topbar.js" defer></script>
    <script src="../js/manutencao.js" defer></script>
</head>
<body data-nav-active="manutencao">
    <div class="layout-app">
        <div id="sidebar-container"></div>

        <div class="conteudo-direito">
            <header class="topbar">
                <div class="topbar-titulo"><h1>Manutenção</h1></div>
                <div class="topbar-usuario">
                    <div class="separador"></div>
                    <span class="saudacao">Olá, <strong id="nome-usuario">Admin</strong></span>
                </div>
            </header>

            <main class="area-principal area-cadastro">
                <div class="cabecalho-cadastro">
                    <button class="btn-voltar" onclick="window.location.href='manutencao.html'">
                        <i class="ph ph-caret-left"></i> Voltar
                    </button>
                    <h2 class="titulo-serifado">Cadastrar nova Manutenção</h2>
                    <div></div>
                </div>

                <hr class="linha-divisoria">

                <form id="form-nova-manutencao" class="form-cadastro">
                    <section class="secao-form">
                        <h3 class="titulo-serifado">Selecionar veículo</h3>
                        <div class="input-grupo-form">
                            <select name="id_veiculo" id="select-veiculo" required>
                                <option value="">Carregando veículos...</option>
                            </select>
                        </div>
                    </section>

                    <hr class="linha-divisoria">

                    <section class="secao-form">
                        <h3 class="titulo-serifado">Informações do serviço</h3>
                        
                        <div class="grid-2-colunas">
                            <div class="input-grupo-form">
                                <label>Tipo de serviço</label>
                                <select name="tipo" required>
                                    <option value="Preventiva">Preventiva</option>
                                    <option value="Corretiva">Corretiva</option>
                                    <option value="Revisão">Revisão</option>
                                </select>
                            </div>
                            <div class="input-grupo-form">
                                <label>Descrição do serviço</label>
                                <input type="text" name="servico" placeholder="Ex: Troca de óleo" required>
                            </div>
                        </div>
                        <br>
                        <div class="grid-2-colunas mt-20">
                            <div class="input-grupo-form">
                                <label>Data</label>
                                <input type="date" name="data" required>
                            </div>
                            <div class="input-grupo-form">
                                <label>Local</label>
                                <input type="text" name="local" placeholder="Nome da oficina" required>
                            </div>
                        </div>

                        <div class="input-grupo-form mt-20" style="max-width: 200px;">
                            <label>Custo</label>
                            <input type="number" step="0.01" name="custo" placeholder="0,00">
                        </div>
                    </section>

                    <div class="acoes-rodape">
                        <button type="button" class="btn-cancelar" onclick="window.location.href='manutencao.html'">CANCELAR</button>
                        <button type="submit" class="btn-salvar"> <i class="ph ph-plus"></i> Adicionar </button>
                    </div>
                </form>
            </main>
        </div>
    </div>
</body>
</html>
